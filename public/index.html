<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My New Website</title>
  <style>
    body { font-family: Arial; max-width: 900px; margin: 40px auto; padding: 0 16px; }
    form { display: grid; gap: 10px; margin-bottom: 20px; }
    input, textarea, button { padding: 10px; font-size: 16px; }
    .card { border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
    small { color: #666; }
  </style>
</head>
<body>
  <h1>New Website (Save Data)</h1>

  <form id="recordForm">
    <input id="name" placeholder="Name" required />
    <textarea id="description" placeholder="Description" required></textarea>
    <button type="submit">Save</button>
  </form>

  <h2>Saved Records</h2>
  <div id="list"></div>

  <script src="app.js"></script>
</body>
</html>
